name: CI
on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: sudo apt-get update && sudo apt-get install -y iperf3
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
        working-directory: packages/netsu
      - run: bun run test
        working-directory: packages/netsu
      - run: bun run build
        working-directory: packages/netsu
      # Dry-run only (no publish.yml).  publish.yml's actual `jsr publish`
      # only runs on pushes to main, so a JSR-breaking change (e.g. an
      # invalid import reachable from jsr.json's source entry point) would
      # otherwise only be caught by that gated publish step, i.e. after
      # merge. Running the dry run here, on every push/PR, catches it before
      # merge instead.
      - run: bunx jsr publish --dry-run --allow-slow-types
        working-directory: packages/netsu
