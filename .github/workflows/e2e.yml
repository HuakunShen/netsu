name: e2e

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

jobs:
  interop-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # netsu-rs compiles inside its own multi-stage Docker image (see
      # interop/Dockerfile.rs), so no host Rust toolchain or musl tooling is
      # needed here — only bun to drive the runner, and Docker (preinstalled on
      # ubuntu-latest).
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run the interop matrix
        run: bun run e2e

      - name: Dump container logs on failure
        if: failure()
        run: docker compose -f interop/docker-compose.yml logs --no-color || true

  quic-transport:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run the native QUIC/netem matrix
        run: bun run e2e:quic

      - name: Dump QUIC container logs on failure
        if: failure()
        run: docker compose -f interop/transports/docker-compose.quic.yml logs --no-color || true
